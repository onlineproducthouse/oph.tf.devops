#
# This container.codebuild.yml file is for the building, testing and deploment of containerized projects
#
# Environment varibles:
#
# AWS_REGION - required
# WORKING_DIR - optional
#
# JOB_ACTION - required. Must be one of: build, test, deploy
# JOB_ACTION_ITEM - required. Must be one of: if JOB_ACTION = test: node, golang; if JOB_ACTION = deploy: container-app, container-db
#
# AWS_SSM_PARAMETER_PATHS - optional
# LOAD_ENV_VARS_SCRIPT_S3_URL - required if AWS_SSM_PARAMETER_PATHS is set
# ENV_VARS_S3_URL - required if AWS_SSM_PARAMETER_PATHS is set
#
# IMAGE_REGISTRY_BASE_URL - required
# RELEASE_MANIFEST - required
# HASH_FILE_PATH - required
#
# # If job action = 'build':
#     GIT_BRANCH - required. Must be one of: develop, main
#     IMAGE_REPOSITORY_NAME - required
#     DOCKERFILE - required
#     UPLOAD_RELEASE_ARTIFACT_ZIP - required. Must be true or false
#     RELEASE_ARTIFACT_ZIP_NAME - required
#     DEV_TOOLS_STORE - required
#
# # If job action = 'test':
#     RUN_TEST_COMMAND e.g. "npm run test"
#
# # If job action = 'deploy':
#     ...
#
# # If job action = 'deploy', job action item = 'container-db':
#     ...
#
# # If job action = 'deploy', job action item = 'container-app':
#     ENV_VARS_S3_ARN - required
#     TASK_FAMILY - required
#     TASK_ROLE_ARN - required
#     CONTAINER_PORT - required
#     CONTAINER_CPU - required
#     CONTAINER_MEMORY_RESERVATION - required
#     CLUSTER_NAME - required
#     SERVICE_NAME - required
#     LOG_GROUP_NAME - required
#     LOG_STREAM_PREFIX - required
#

version: 0.2

env:
  shell: bash
  variables:
    LOAD_ENV_VARS_SCRIPT_PATH: "./ci/load-env-vars.sh"
    ENV_FILE: ".env"

cache:
  key: cntnr-key-$(sha256sum $HASH_FILE_PATH)
  fallback-keys:
    - cntnr-key-$(sha256sum $HASH_FILE_PATH)
    - cntnr-key-
    - cntnr-
  paths:
    - $WORKING_DIR/ci/load-env-vars.sh

artifacts:
  files:
    - "**/*"

phases:
  install:
    commands:
      - |
        apt-get update -y \
          && apt-get install -y curl jq zip

      - |
        if [[ "$JOB_ACTION" == "build" ]]; then
          echo 'Configuring docker-buildx'

          export BUILDX_VERSION=$(curl --silent "https://api.github.com/repos/docker/buildx/releases/latest" | jq -r .tag_name)
          curl -JLO "https://github.com/docker/buildx/releases/download/$BUILDX_VERSION/buildx-$BUILDX_VERSION.linux-amd64"
          mkdir -p ~/.docker/cli-plugins
          mv "buildx-$BUILDX_VERSION.linux-amd64" ~/.docker/cli-plugins/docker-buildx

          chmod +x ~/.docker/cli-plugins/docker-buildx
        fi

      - |
        if [[ "$JOB_ACTION" == "test" ]]; then
          if [[ "$JOB_ACTION_ITEM" == "node" ]]; then
            n 25.2.1
            node -v
          fi

          if [[ "$JOB_ACTION_ITEM" == "golang" ]]; then
            cd $HOME/.goenv && git pull --ff-only && cd -
            goenv install 1.25.5
            goenv local 1.25.5
            go version
          fi
        fi

  pre_build:
    commands:
      - |
        if [[ "$AWS_REGION" == "" ]];then
          echo "AWS Region not set. please set AWS Region"
          exit 1
        fi

        if [[ "$WORKING_DIR" == "" ]]; then
          export WORKING_DIR=$CODEBUILD_SRC_DIR
        else
          export WORKING_DIR="$CODEBUILD_SRC_DIR/$WORKING_DIR"
        fi

        if [[ "$IMAGE_REGISTRY_BASE_URL" == "" ]];then
          echo "image registry base url not set. please set image registry base url"
          exit 1
        fi

        if [[ "$RELEASE_MANIFEST" == "" ]];then
          echo "release manifest name not set. please set release manifest name"
          exit 1
        fi

      - |
        if [[ "$AWS_SSM_PARAMETER_PATHS" != "" ]];then
          if [[ ! -f $LOAD_ENV_VARS_SCRIPT_PATH ]]; then
            if [[ "$LOAD_ENV_VARS_SCRIPT_S3_URL" == "" ]];then
              echo "load-env-vars script AWS S3 URL not set. please set load-env-vars script AWS S3 URL"
              exit 1
            fi

            if [[ "$ENV_VARS_S3_URL" == "" ]];then
              echo ".env file AWS S3 URL not set. please set .env file AWS S3 URL"
              exit 1
            fi

            aws s3 cp $LOAD_ENV_VARS_SCRIPT_S3_URL $LOAD_ENV_VARS_SCRIPT_PATH
            export ENV_FILE="$WORKING_DIR/.env"
            source $LOAD_ENV_VARS_SCRIPT_PATH $AWS_REGION $AWS_SSM_PARAMETER_PATHS $ENV_VARS_S3_URL $WORKING_DIR
          else
            echo "Retrived $LOAD_ENV_VARS_SCRIPT_PATH from cache"
          fi
        fi

      - |
        if [[ "$JOB_ACTION" == "build" ]];then
          if [[ "$GIT_BRANCH" == "" ]];then
            echo "git branch name not set. please set git branch name"
            exit 1
          fi

          if [[ "$IMAGE_REPOSITORY_NAME" == "" ]];then
            echo "image registry not set. please set image registry name"
            exit 1
          fi

          if [[ "$DOCKERFILE" == "" ]];then
            echo "dockerfile not set. please set dockerfile name"
            exit 1
          fi

          if [[ "$UPLOAD_RELEASE_ARTIFACT_ZIP" == "true" ]];then
            if [[ "$RELEASE_ARTIFACT_ZIP_NAME" == "" ]];then
              echo "name for release artefact zip not set"
              exit 1
            fi

            if [[ "$DEV_TOOLS_STORE" == "" ]];then
              echo "S3 bucket for dev tools not set"
              exit 1
            fi
          fi

          export IMAGE_TAG="$IMAGE_REPOSITORY_NAME:$CODEBUILD_RESOLVED_SOURCE_VERSION"
          if [[ "$GIT_BRANCH" == "develop" ]]; then
            export IMAGE_TAG="$IMAGE_REPOSITORY_NAME:latest"
          fi

          export CACHE_IMAGE_TAG="$IMAGE_REPOSITORY_NAME:$GIT_BRANCH"
          export FULL_IMAGE_TAG=$IMAGE_REGISTRY_BASE_URL/$IMAGE_TAG

          echo $(aws ecr get-login-password | docker login --username AWS --password-stdin $IMAGE_REGISTRY_BASE_URL)
          docker run --privileged --rm "$IMAGE_REGISTRY_BASE_URL/tonistiigi/binfmt:latest" --install arm64
          docker buildx create --use --name multiarch
        fi

      - |
        if [[ "$JOB_ACTION" == "test" ]];then
          if [[ "$RUN_TEST_COMMAND" == "" ]]; then
            echo "[run-test]: tests command not set, please set RUN_TEST_COMMAND"
            exit 1
          fi
        fi

      - |
        if [[ "$JOB_ACTION" == "deploy" && "$JOB_ACTION_ITEM" == "container-app" ]]; then
          if [[ "$ENV_VARS_S3_ARN" == "" ]];then
            echo "AWS S3 arn for env variables not set. please set AWS S3 arn for env variables"
            exit 1
          fi

          if [[ "$TASK_FAMILY" == "" ]];then
            echo "AWS ECS task family not set. please set AWS ECS task family"
            exit 1
          fi

          if [[ "$TASK_ROLE_ARN" == "" ]];then
            echo "AWS ECS task role arn not set. please set AWS ECS task role arn"
            exit 1
          fi

          if [[ "$CONTAINER_CPU" == "" ]];then
            echo "AWS ECS container cpu not set. please set AWS ECS container cpu"
            exit 1
          fi

          if [[ "$CONTAINER_MEMORY_RESERVATION" == "" ]];then
            echo "AWS ECS container memory reservation not set. please set AWS ECS container memory reservation"
            exit 1
          fi

          if [[ "$CLUSTER_NAME" == "" ]];then
            echo "AWS ECS cluster name not set. please set AWS ECS cluster name"
            exit 1
          fi

          if [[ "$SERVICE_NAME" == "" ]];then
            echo "AWS ECS service name not set. please set AWS ECS cluster name"
            exit 1
          fi

          if [[ "$LOG_GROUP_NAME" == "" ]];then
            echo "AWS CloudWatch log group name not set. please set AWS CloudWatch log group name"
            exit 1
          fi

          if [[ "$LOG_STREAM_PREFIX" == "" ]];then
            echo "AWS CloudWatch log stream prefix not set. please set AWS CloudWatch log stream prefix"
            exit 1
          fi
        fi

      - |
        if [[ "$JOB_ACTION" == "deploy" && "$JOB_ACTION_ITEM" == "container-app" ]]; then
          export ECS_TASK="$WORKING_DIR/ci/task-ecs.json"

          LOCAL_PORT_MAPPING='[]'
          if [[ "$CONTAINER_PORT" != "" && $CONTAINER_PORT != "0" ]]; then
            LOCAL_PORT_MAPPING='[
              {
                "name": "'$TASK_FAMILY'",
                "protocol": "tcp",
                "containerPort": '$CONTAINER_PORT',
                "hostPort": '$CONTAINER_PORT'
              }
            ]'
          fi
        fi

      - |
        if [[ "$JOB_ACTION" == "deploy" && "$JOB_ACTION_ITEM" == "container-app" ]]; then
          # populate ecs json files
          source $RELEASE_MANIFEST \
            && echo '{
              "family": "'$TASK_FAMILY'",
              "taskRoleArn": "'$TASK_ROLE_ARN'",
              "executionRoleArn": "'$TASK_ROLE_ARN'",
              "networkMode": "host",
              "requiresCompatibilities": ["EC2"],
              "cpu": "'$CONTAINER_CPU'",
              "memory": "'$CONTAINER_MEMORY_RESERVATION'",
              "containerDefinitions": [
                {
                  "name": "'$TASK_FAMILY'",
                  "essential": true,
                  "image": "'$DKR_IMAGE'",
                  "cpu": '$CONTAINER_CPU',
                  "memory": '$CONTAINER_MEMORY_RESERVATION',
                  "portMappings": '$LOCAL_PORT_MAPPING',
                  "logConfiguration": {
                    "logDriver": "awslogs",
                    "options": {
                      "awslogs-group": "'$LOG_GROUP_NAME'",
                      "awslogs-region": "'$AWS_REGION'",
                      "awslogs-stream-prefix": "'$LOG_STREAM_PREFIX'"
                    }
                  },
                  "environmentFiles": [
                    {
                      "value": "'$ENV_VARS_S3_ARN'",
                      "type": "s3"
                    }
                  ]
                }
              ]
            }' >$ECS_TASK
        fi

      - |
        echo $(aws ecr get-login-password | docker login --username AWS --password-stdin $IMAGE_REGISTRY_BASE_URL)

        cd $WORKING_DIR

  build:
    commands:
      - |
        if [[ "$JOB_ACTION" == "build" ]]; then
          DKR_BUILD_PLATFORM=linux/amd64

          if [[ "$GIT_BRANCH" == "develop" ]];then
            DKR_BUILD_PLATFORM=linux/arm64,linux/amd64
          fi

          docker buildx build --push --force-rm \
            --platform=$DKR_BUILD_PLATFORM \
            --build-arg IMAGE_REGISTRY_BASE_URL=$IMAGE_REGISTRY_BASE_URL \
            --cache-from=type=registry,ref=$CACHE_IMAGE_TAG \
            --cache-to=type=registry,ref=$CACHE_IMAGE_TAG,mode=max \
            --tag $CACHE_IMAGE_TAG \
            --tag $FULL_IMAGE_TAG \
            --file $DOCKERFILE \
            .
        fi

      - |
        if [[ "$JOB_ACTION" == "test" ]]; then
          eval $RUN_TEST_COMMAND
        fi

      - |
        if [[ "$JOB_ACTION" == "deploy" ]]; then
          if [[ "$JOB_ACTION_ITEM" == "container-app" ]]; then
            aws ecs register-task-definition --family $TASK_FAMILY --cli-input-json file://$ECS_TASK
            TASK_REVISION=$(aws ecs describe-task-definition --task-definition $TASK_FAMILY | jq '.taskDefinition.revision')

            aws ecs update-service --force-new-deployment \
              --cluster $CLUSTER_NAME \
              --service $SERVICE_NAME \
              --task-definition $TASK_FAMILY:$TASK_REVISION
          fi

          if [[ "$JOB_ACTION_ITEM" == "container-db" ]]; then
            source $RELEASE_MANIFEST && \
              docker pull $DKR_IMAGE && \
              docker run --env-file $ENV_FILE $DKR_IMAGE
          fi
        fi

  post_build:
    commands:
      - |
        if [[ "$JOB_ACTION" == "build" ]]; then
          if [[ "$GIT_BRANCH" != "develop" ]]; then
            echo "DKR_IMAGE=$FULL_IMAGE_TAG" >$RELEASE_MANIFEST
          fi

          if [[ "$UPLOAD_RELEASE_ARTIFACT_ZIP" == "true" ]]; then
            zip -r $RELEASE_ARTIFACT_ZIP_NAME ./*
            aws s3 cp $RELEASE_ARTIFACT_ZIP_NAME $DEV_TOOLS_STORE/$RELEASE_ARTIFACT_ZIP_NAME
          fi
        fi

        echo "$JOB_ACTION finished"

        ls -al
