#
# This codebuild.yml file is for the building, testing and deploment of terraform projects
#
# Environment varibles:
#   JOB_ACTION - required. Must be one of: build, test, deploy
#   WORKING_DIR - optional
#   AWS_SSM_PARAMETER_PATHS - optional
#   LOAD_ENV_VARS_SCRIPT_S3_URL - required if AWS_SSM_PARAMETER_PATHS is set
#   AWS_REGION - required if AWS_SSM_PARAMETER_PATHS is set
#   ENV_VARS_S3_URL - required if AWS_SSM_PARAMETER_PATHS is set
#

version: 0.2

env:
  shell: bash
  variables:
    LOAD_ENV_VARS_SCRIPT_PATH: "./ci/load-env-vars.sh"
    ENV_FILE: ".env"

cache:
  key: tf-key-$(sha256sum $WORKING_DIR/.terraform.lock.hcl)
  fallback-keys:
    - tf-key-$(sha256sum $WORKING_DIR/.terraform.lock.hcl)
    - tf-key-
    - tf-
  paths:
    - /usr/bin/terraform
    - $WORKING_DIR/ci/load-env-vars.sh
    - $WORKING_DIR/.terraform.lock.hcl

artifacts:
  files:
    - ".terraform"
    - "tfplan"
    - ".terraform.lock.hcl"
    - "**/*.tf"

phases:
  install:
    commands:
      - |
        apt-get update -y \
          && apt-get install -y \
            gnupg \
            software-properties-common \
            curl \
            jq \
            zip

      - |
        echo 'Configuring Terraform'
        if [ -e '/usr/bin/terraform' ]; then
          echo 'terraform found from cache.'
        else
          echo 'terraform not found from cache. Installing Terraform...'
          curl -s -qL -o terraform_install.zip https://releases.hashicorp.com/terraform/1.13.4/terraform_1.13.4_linux_amd64.zip
          unzip terraform_install.zip -d /usr/bin/
        fi

        chmod +x '/usr/bin/terraform'

        terraform --version

  pre_build:
    commands:
      - |
        if [[ "$WORKING_DIR" == "" ]]; then
          export WORKING_DIR=$CODEBUILD_SRC_DIR
        else
          export WORKING_DIR="$CODEBUILD_SRC_DIR/$WORKING_DIR"
        fi

        if [[ "$AWS_SSM_PARAMETER_PATHS" != "" ]];then
          if [[ ! -f $LOAD_ENV_VARS_SCRIPT_PATH ]]; then
            if [[ "$LOAD_ENV_VARS_SCRIPT_S3_URL" == "" ]];then
              echo "load-env-vars script AWS S3 URL not set. please set load-env-vars script AWS S3 URL"
              exit 1
            fi

            if [[ "$AWS_REGION" == "" ]];then
              echo "AWS Region not set. please set AWS Region"
              exit 1
            fi

            if [[ "$ENV_VARS_S3_URL" == "" ]];then
              echo ".env file AWS S3 URL not set. please set .env file AWS S3 URL"
              exit 1
            fi

            aws s3 cp $LOAD_ENV_VARS_SCRIPT_S3_URL $LOAD_ENV_VARS_SCRIPT_PATH
            export ENV_FILE="$WORKING_DIR/.env"
            source $LOAD_ENV_VARS_SCRIPT_PATH $AWS_REGION $AWS_SSM_PARAMETER_PATHS $ENV_VARS_S3_URL $WORKING_DIR
          else
            echo "Retrived $LOAD_ENV_VARS_SCRIPT_PATH from cache"
          fi
        fi

        cd $WORKING_DIR

  build:
    commands:
      - ls -al

      - |
        if [[ "$JOB_ACTION" == "build" ]]; then
          terraform init \
            && terraform validate \
            && terraform plan -input=false -out=tfplan
        fi

        if [[ "$JOB_ACTION" == "test" ]]; then
          echo "Not implemented"
        fi

        if [[ "$JOB_ACTION" == "deploy" ]]; then
          echo "terraform apply tfplan"
          terraform apply tfplan
        fi

  post_build:
    commands:
      - ls -al
      - echo "Terraform $JOB_ACTION finished"
